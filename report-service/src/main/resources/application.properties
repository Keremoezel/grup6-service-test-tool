server.port=${PORT:8083}
spring.application.name=report-service

# Diger servislerin adresleri - env var yoksa Docker network default
chaos.service.url=${CHAOS_SERVICE_URL:http://chaos-service:8081}
security.service.url=${SECURITY_SERVICE_URL:http://security-service:8082}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
