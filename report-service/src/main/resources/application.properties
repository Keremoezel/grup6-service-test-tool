server.port=${PORT:8083}
spring.application.name=report-service

# Diger servislerin adresleri - env var yoksa Docker network default
chaos.service.url=${CHAOS_SERVICE_URL:http://chaos-service:8081}
security.service.url=${SECURITY_SERVICE_URL:http://security-service:8082}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Database settings
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/grup6db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:grup6}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:grup6pass}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
