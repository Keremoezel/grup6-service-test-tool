server.port=8081
spring.application.name=chaos-service

# PostgreSQL - env var yoksa localhost default kullan
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/grup6db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:grup6}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:grup6pass}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Actuator endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
